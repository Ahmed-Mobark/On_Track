<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="480" viewBox="0 0 1200 480" xmlns="http://www.w3.org/2000/svg">
  <title>ON TRACK – Neon Accent Version</title>
  <desc>ON TRACK premium sportswear – neon green accent version, transparent background</desc>

  <!-- Neon speed slash -->
  <polygon points="530,60 582,60 472,420 420,420" fill="#B5F23D"/>

  <!-- ON -->
  <text x="120" y="310"
    font-family="'Arial Black','Helvetica Neue',Helvetica,Arial,sans-serif"
    font-weight="900"
    font-size="260"
    letter-spacing="-6"
    fill="#FFFFFF">ON</text>

  <!-- TRACK -->
  <text x="640" y="310"
    font-family="'Arial Black','Helvetica Neue',Helvetica,Arial,sans-serif"
    font-weight="900"
    font-size="260"
    letter-spacing="-6"
    fill="#FFFFFF">TRACK</text>

  <!-- Neon underline under ON -->
  <rect x="120" y="325" width="290" height="8" rx="4" fill="#B5F23D"/>

  <!-- Divider -->
  <line x1="120" y1="345" x2="1080" y2="345" stroke="#333333" stroke-width="1"/>

  <!-- Tagline -->
  <text x="600" y="420"
    font-family="'Arial','Helvetica Neue',Helvetica,sans-serif"
    font-weight="400"
    font-size="36"
    letter-spacing="14"
    text-anchor="middle"
    fill="#888888">PERFORMANCE WEAR</text>
</svg>
