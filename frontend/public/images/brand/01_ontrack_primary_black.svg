<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="480" viewBox="0 0 1200 480" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <title>ON TRACK – Primary Logo Black</title>
  <desc>ON TRACK premium sportswear brand – primary black version on transparent background</desc>

  <!-- Background: transparent (no rect fill) -->

  <!-- Speed slash accent mark -->
  <polygon points="530,60 582,60 472,420 420,420" fill="#0A0A0A"/>

  <!-- ON -->
  <text x="120" y="310"
    font-family="'Arial Black','Helvetica Neue',Helvetica,Arial,sans-serif"
    font-weight="900"
    font-size="260"
    letter-spacing="-6"
    fill="#0A0A0A">ON</text>

  <!-- TRACK -->
  <text x="640" y="310"
    font-family="'Arial Black','Helvetica Neue',Helvetica,Arial,sans-serif"
    font-weight="900"
    font-size="260"
    letter-spacing="-6"
    fill="#0A0A0A">TRACK</text>

  <!-- Divider line -->
  <line x1="120" y1="340" x2="1080" y2="340" stroke="#0A0A0A" stroke-width="2"/>

  <!-- Tagline -->
  <text x="600" y="420"
    font-family="'Arial','Helvetica Neue',Helvetica,sans-serif"
    font-weight="400"
    font-size="36"
    letter-spacing="14"
    text-anchor="middle"
    fill="#0A0A0A">PERFORMANCE WEAR</text>
</svg>
