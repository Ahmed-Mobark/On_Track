<?xml version="1.0" encoding="UTF-8"?>
<svg width="1400" height="280" viewBox="0 0 1400 280" xmlns="http://www.w3.org/2000/svg">
  <title>ON TRACK – Horizontal Logo White</title>
  <desc>ON TRACK horizontal compact logo white version – transparent background</desc>

  <!-- Speed slash -->
  <polygon points="60,30 92,30 48,250 16,250" fill="#FFFFFF"/>

  <!-- Wordmark -->
  <text x="110" y="210"
    font-family="'Arial Black','Helvetica Neue',Helvetica,Arial,sans-serif"
    font-weight="900"
    font-size="200"
    letter-spacing="4"
    fill="#FFFFFF">ON TRACK</text>

  <!-- Thin underline -->
  <line x1="16" y1="226" x2="1384" y2="226" stroke="#FFFFFF" stroke-width="2"/>

  <!-- Tagline -->
  <text x="700" y="268"
    font-family="'Arial','Helvetica Neue',Helvetica,sans-serif"
    font-weight="400"
    font-size="28"
    letter-spacing="12"
    text-anchor="middle"
    fill="#FFFFFF">PERFORMANCE WEAR</text>
</svg>
